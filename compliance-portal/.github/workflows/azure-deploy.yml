name: Deploy to Azure App Service

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: 'your-app-service-name'
  AZURE_WEBAPP_PACKAGE_PATH: './compliance-portal/server'
  NODE_VERSION: '20.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: '${{ env.AZURE_WEBAPP_PACKAGE_PATH }}/package-lock.json'

    - name: Install dependencies
      working-directory: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
      run: npm ci

    - name: Build application
      working-directory: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
      run: npm run build

    - name: Install Playwright browsers
      working-directory: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
      run: npx playwright install chromium --with-deps

    - name: Create deployment package
      working-directory: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
      run: |
        zip -r deploy.zip \
          dist/ \
          node_modules/ \
          package.json \
          package-lock.json

    - name: Deploy to Azure App Service
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}/deploy.zip

    - name: Run post-deployment tasks
      uses: azure/CLI@v1
      with:
        inlineScript: |
          az webapp config appsettings set \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group your-resource-group \
            --settings WEBSITE_RUN_FROM_PACKAGE=0
          
          # Restart app to ensure new deployment is loaded
          az webapp restart \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group your-resource-group
