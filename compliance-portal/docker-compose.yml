version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      # SQLite by default (file will be in container)
      # For PostgreSQL, uncomment and configure:
      # - DATABASE_URL=postgresql://user:password@host:5432/dbname
      # - USE_POSTGRES=true
    volumes:
      # Persist SQLite database
      - ./data:/app/data
      # Persist scan reports
      - ./data/reports:/app/data/reports
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 3s
      start_period: 40s
      retries: 3

  # Optional: PostgreSQL service for production-like setup
  # postgres:
  #   image: postgres:16-alpine
  #   environment:
  #     - POSTGRES_USER=compliance
  #     - POSTGRES_PASSWORD=compliance
  #     - POSTGRES_DB=compliance
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   restart: unless-stopped

